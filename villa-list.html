            const urlParams = new URLSearchParams(window.location.search);

            const bhkParam = urlParams.get('bhk');

            let priceHtml = '';
            
            if (isDateSelected) {
                let baseWd = parseFloat(v.priceWd);
                let baseWe = v.isPerPersonOffer ? parseFloat(v.priceWd) : parseFloat(v.priceWe);
                let total = (globalWdCount * baseWd) + (globalWeCount * baseWe);
                
                priceHtml = `
                    <div class="flex justify-between items-center bg-[#d4af37]/10 px-3 py-2 rounded-lg border border-[#d4af37]/30">
                        <span class="text-gray-700 text-[11px] font-bold uppercase">Total for ${globalTotalNights} Nights</span>
                        <span class="text-[#d4af37] font-extrabold text-[16px]">₹${total.toLocaleString('en-IN')}${v.isPerPersonOffer ? '<span class="text-xs font-medium lowercase text-gray-500 ml-1">/pp</span>' : ''}</span>
                    </div>
                `;
            } else {
                priceHtml = `
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-gray-500 text-[11px] font-medium uppercase">Weekdays</span>
                        <span class="text-gray-800 font-bold text-[15px]">₹${parseFloat(v.priceWd).toLocaleString('en-IN')}${v.isPerPersonOffer ? '<span class="text-xs font-medium text-gray-500 ml-1">/pp</span>' : ''}</span>
                    </div>
                    <div class="flex justify-between items-center bg-gray-50 px-2 py-1 rounded">
                        <span class="text-gray-500 text-[11px] font-bold uppercase">Weekends</span>
                        <span class="text-gray-800 font-bold text-[15px]">₹${parseFloat(v.priceWe).toLocaleString('en-IN')}${v.isPerPersonOffer ? '<span class="text-xs font-medium text-gray-500 ml-1">/pp</span>' : ''}</span>
                    </div>
                `;
            }

            return `
                <a href="villa.html?id=${realId}" class="villa-card group block shrink-0">
                    <div class="bg-white rounded-xl overflow-hidden border border-gray-100 shadow-sm hover:shadow-xl transition-all duration-300 h-full flex flex-col">
                        <div class="relative h-56 overflow-hidden bg-gray-100">
                            <img src="${v.img}" onerror="this.src='https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=400'" alt="${v.title}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                        </div>
                        <div class="p-5 flex flex-col flex-grow">
                            <h3 class="font-bold text-gray-900 text-[15px] leading-tight mb-2 line-clamp-2">${v.title}</h3>
                            
                            <div class="flex items-center gap-2 text-[#d4af37] text-xs font-bold mb-4 uppercase tracking-widest">
                                <i class="fa-solid fa-location-dot"></i> ${v.loc}
                            </div>
                            
                            <div class="flex flex-col mt-auto pt-4 border-t border-gray-100 min-h-[60px] justify-end">
                                ${priceHtml}
                            </div>
                        </div>
                    </div>
                </a>
            `;
        }

        function renderVillas() {
            const search = searchInput.value.toLowerCase();
            const bhkVal = bhkFilter.value;
            const locVal = locationFilter.value.toLowerCase();

            const filtered = villas.filter(v => {
                const matchSearch = v.title.toLowerCase().includes(search) || v.loc.toLowerCase().includes(search);
                const matchBhk = bhkVal === 'All' || v.bhk.toString() === bhkVal;
                const matchLoc = locVal === 'all' || v.loc.toLowerCase().includes(locVal);
                return matchSearch && matchBhk && matchLoc;
            });

            const grouped = filtered.reduce((acc, v) => {
                if (!acc[v.bhk]) acc[v.bhk] = [];
                acc[v.bhk].push(v);
                return acc;
            }, {});

            dynamicSections.innerHTML = '';
            
            if(Object.keys(grouped).length === 0) {
                dynamicSections.innerHTML = `
                    <div class="text-center py-32 text-gray-400">
                        <i class="fa-solid fa-magnifying-glass text-5xl mb-6 opacity-30"></i>
                        <p class="text-xl serif">No villas found matching your criteria.</p>
                        <button onclick="clearFilters()" class="text-[#d4af37] mt-4 font-bold uppercase tracking-widest text-sm hover:underline">Clear Filters</button>
                    </div>`;
                return;
            }

            const sortedBhkKeys = Object.keys(grouped).sort((a, b) => Number(a) - Number(b));

            sortedBhkKeys.forEach(bhk => {
                const sectionHtml = `
                    <section class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-100">
                        <div class="flex items-center justify-between mb-8 border-b border-gray-100 pb-4">
                            <div class="flex items-center gap-4">
                                <h2 class="serif text-3xl font-normal text-gray-900">${bhk} BHK Luxury Villas</h2>
                                <span class="bg-[#d4af37] text-black text-[10px] px-3 py-1 rounded-full font-bold tracking-widest uppercase">${grouped[bhk].length} Properties</span>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="scrollSection('carousel-${bhk}', -1)" class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center hover:bg-[#d4af37] hover:text-white hover:border-[#d4af37] text-gray-500 transition"><i class="fa-solid fa-chevron-left"></i></button>
                                <button onclick="scrollSection('carousel-${bhk}', 1)" class="w-10 h-10 rounded-full border border-gray-200 flex items-center justify-center hover:bg-[#d4af37] hover:text-white hover:border-[#d4af37] text-gray-500 transition"><i class="fa-solid fa-chevron-right"></i></button>
                            </div>
                        </div>
                        <div id="carousel-${bhk}" class="scroll-container flex gap-6 overflow-x-auto no-scrollbar pb-4 pt-2">
                            ${grouped[bhk].map(v => createCard(v)).join('')}
                        </div>
                    </section>
                `;
                dynamicSections.innerHTML += sectionHtml;
            });
        }

        window.scrollSection = function(id, direction) {
            const container = document.getElementById(id);
            if (container) {
                const scrollAmount = (window.innerWidth > 768 ? 370 : 320) * direction;
                container.scrollBy({ left: scrollAmount, behavior: 'smooth' });
            }
        }

        window.clearFilters = function() {
            searchInput.value = '';
            bhkFilter.value = 'All';
            locationFilter.value = 'All';
            document.getElementById('blossom-dates')._flatpickr.clear();
            isDateSelected = false;
            // Remove URL params so they don't stick around
            window.history.replaceState({}, document.title, window.location.pathname);
            renderVillas();
        }

        // Initialize Page
        document.addEventListener('DOMContentLoaded', () => {
            const presetDates = applyUrlParameters();
            
            const fp = flatpickr("#blossom-dates", {
                mode: "range",
                minDate: "today",
                dateFormat: "Y-m-d",
                altInput: true,
                altFormat: "M j, Y",
                showMonths: window.innerWidth > 768 ? 2 : 1,
                defaultDate: presetDates ? presetDates.split(' to ') : null,
                onChange: function(selectedDates) {
                    if (selectedDates.length === 2) {
                        let wdCount = 0;
                        let weCount = 0;
                        let currentDate = new Date(selectedDates[0]);
                        let endDate = selectedDates[1];
                        
                        while (currentDate < endDate) {
                            let day = currentDate.getDay();
                            if (day === 5 || day === 6) weCount++;
                            else wdCount++;
                            currentDate.setDate(currentDate.getDate() + 1);
                        }
                        
                        globalWdCount = wdCount;
                        globalWeCount = weCount;
                        globalTotalNights = wdCount + weCount;
                        isDateSelected = true;
                    } else {
                        isDateSelected = false;
                    }
                    renderVillas();
                }
            });

            // Trigger initial calculation if dates were passed in URL
            if (presetDates && presetDates.includes(' to ')) {
                fp.config.onChange[0](fp.selectedDates);
            }

            // Event Listeners for Filters
            searchInput.addEventListener('input', renderVillas);
            bhkFilter.addEventListener('change', renderVillas);
            locationFilter.addEventListener('change', renderVillas);

            renderVillas();
        });

    </script>
</body>
</html>
